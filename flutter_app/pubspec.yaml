name: pump_controller
description: Pump remote control app with Firebase

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core:      ^2.27.0
  firebase_database:  ^10.4.9
  firebase_auth:      ^4.19.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.3
  fl_chart:                   ^0.69.0
  shared_preferences:         ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
