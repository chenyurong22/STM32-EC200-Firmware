[env:disco_g071rb]
platform = ststm32
board = disco_g071rb
framework = stm32cube
board_build.mcu = stm32g071rbt6
board_build.f_cpu = 64000000L
upload_protocol = stlink
monitor_speed = 9600
monitor_port = COM43
build_flags =
    -Iinclude
    -DSTM32G071xx
    -DUSE_HAL_DRIVER
    -DFW_MIN_LOGS
    -Os
    -fno-unwind-tables
    -fno-asynchronous-unwind-tables
    -ffunction-sections
    -fdata-sections
    --specs=nano.specs
    -Wl,--gc-sections,--print-memory-usage
; Exclude sensors_adc.c (step 4 — real ADC) until hardware is wired.
; To activate: uncomment HAL_ADC_MODULE_ENABLED in hal_conf.h,
;              delete sensors.c stub, rename sensors_adc.c → sensors.c,
;              then remove the -<sensors_adc.c> line below.
board_build.ldscript = STM32G070KBTX_APP.ld
extra_scripts = post_upload.py
build_src_filter = +<*> -<sensors_adc.c>
